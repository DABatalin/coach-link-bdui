name: BDUI Kit Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  bdui-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies for bdui_kit
      working-directory: ./packages/bdui_kit
      run: flutter pub get
      
    - name: Run all bdui_kit tests
      working-directory: ./packages/bdui_kit
      run: flutter test --coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: packages/bdui_kit/coverage/lcov.info
        flags: bdui-kit
        name: bdui-kit-coverage
        fail_ci_if_error: false