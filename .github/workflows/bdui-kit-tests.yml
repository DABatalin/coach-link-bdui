name: BDUI Kit Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  bdui-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.4'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies for bdui_kit
      working-directory: ./packages/bdui_kit
      run: flutter pub get
      
    - name: Run bdui_kit tests (excluding golden tests)
      working-directory: ./packages/bdui_kit
      run: flutter test test/ --exclude-tags=golden --coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: packages/bdui_kit/coverage/lcov.info
        flags: bdui-kit
        name: bdui-kit-coverage
        fail_ci_if_error: false