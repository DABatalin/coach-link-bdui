name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FLUTTER_VERSION: '3.27.4'

jobs:
  bdui_kit:
    name: bdui_kit (analyze & test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/bdui_kit
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bdui_kit-golden-failures
          path: packages/bdui_kit/test/**/failures/**
          if-no-files-found: ignore

  app:
    name: coach_link app (analyze & test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
