name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FLUTTER_VERSION: '3.27.4'

jobs:
  bdui_kit:
    name: bdui_kit (analyze & test)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: packages/bdui_kit
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Update CI goldens (push to master only)
        if: github.event_name == 'push'
        run: flutter test --update-goldens test/golden_test.dart

      - name: Test
        run: flutter test

      - name: Commit updated CI goldens
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: update bdui_kit golden files [skip ci]'
          file_pattern: packages/bdui_kit/test/goldens/ci/**

      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bdui_kit-golden-failures
          path: packages/bdui_kit/test/failures/**
          if-no-files-found: ignore

  app:
    name: coach_link app (analyze & test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies (bdui_kit)
        working-directory: packages/bdui_kit
        run: flutter pub get

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
