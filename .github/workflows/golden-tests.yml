name: Golden Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  golden-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies for main app
      run: flutter pub get
      
    - name: Get dependencies for bdui_kit package
      working-directory: ./packages/bdui_kit
      run: flutter pub get
      
    - name: Run golden tests
      working-directory: ./packages/bdui_kit
      run: flutter test test/golden_test.dart
      
    - name: Upload golden test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: golden-test-results
        path: packages/bdui_kit/test/goldens/
        retention-days: 7