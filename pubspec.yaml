name: coach_link
description: "CoachLink — платформа для автоматизации тренировочного процесса"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  bloc_concurrency: ^0.2.5

  # DI
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0

  # Auth / Storage
  flutter_secure_storage: ^9.2.3

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase / Push Notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.2.1
  flutter_local_notifications: ^18.0.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # BDUI
  bdui_kit:
    path: packages/bdui_kit

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
