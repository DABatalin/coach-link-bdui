name: coach_link
description: "CoachLink — платформа для автоматизации тренировочного процесса"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  bloc_concurrency: ^0.2.5

  # DI
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0

  # Auth / Storage
  flutter_secure_storage: ^9.2.3

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase / Push Notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.2.1
  flutter_local_notifications: ^18.0.1
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Internationalization
  easy_localization: ^3.0.7

  # BDUI
  bdui_kit:
    path: packages/bdui_kit

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  
  # App Icon Generator
  flutter_launcher_icons: ^0.13.1
  
  # Splash Screen Generator
  flutter_native_splash: ^2.3.9

  # Internationalization
  easy_localization_generator: ^0.3.3

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/icon.png
    - assets/logo.png
    - assets/translations/

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true

# Flutter Native Splash Configuration
flutter_native_splash:
  color: "#ffffff"
  image: assets/logo.png
  color_dark: "#1a1a1a"
  image_dark: assets/logo.png
  android: true
  ios: true
  web: false
  
  android_gravity: center
  ios_content_mode: center
  
  fullscreen: true
